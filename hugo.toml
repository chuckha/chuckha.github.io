baseURL = "https://chuckha.github.io/"
languageCode = "en-us"
title = "A Professional Gluer"
theme = "gluer"
[pagination]
  pagerSize = 10

[params]
  env = "production"
  defaultTheme = "auto"
  ShowReadingTime = true
  mainSections = ["posts"]
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true

  [params.homeInfoParams]
    Title = "A Professional Gluer"
    Content = "Writing about AI, automation, and building things."

[markup]
  [markup.highlight]
    noClasses = false
    lineNos = false
    codeFences = true
    guessSyntax = true

[outputs]
  home = ["HTML", "RSS"]

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
